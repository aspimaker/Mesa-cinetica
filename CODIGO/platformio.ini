; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:nucleo_g071rb]
platform = ststm32
board = nucleo_g071rb
framework = arduino


# Configuración avanzada
board_build.mcu = stm32g071rbt6
board_build.f_cpu = 64000000L


# Velocidad de comunicación serie
monitor_speed = 115200


# Opciones de subida
upload_protocol = stlink
monitor_speed = 115200


# Opciones para debugging con ST-LINK/V2-1
debug_tool = stlink
debug_server = 
    st-util
    -p 4242
    -m
debug_build_flags = 
    -g
    -D DEBUG


# Optimizaciones y flags de compilación
build_flags = 
    -Os                          # Optimizar tamaño
    -D DEBUG_MODE                # Modo debug
    -D ARDUINO_NUCLEO_G071RB     # Definir placa
    -D STM32G071xx
    -D HAL_UART_MODULE_ENABLED
    -D HAL_TIM_MODULE_ENABLED
    -D HAL_GPIO_MODULE_ENABLED 
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
    -std=gnu++17                 # Estándar C++ moderno


lib_deps = 
    laurb9/StepperDriver@^1.6.0  # Para drivers A4988, DRV8825, etc.
    adafruit/Adafruit NeoPixel@^1.12.0  # LEDs
    adafruit/Adafruit GFX Library@^1.11.0  # Biblioteca gráfica para pantallas
    adafruit/Adafruit ST7735S@^1.0.0  # Driver para pantalla ST7735S
